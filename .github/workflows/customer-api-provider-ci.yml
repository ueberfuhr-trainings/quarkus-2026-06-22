name: CI (Customer API Provider)

on:
  push:
    branches:
      - main
    paths:
      - 'customer-api-provider/**'

  pull_request:
    branches:
      - main
    paths:
      - 'customer-api-provider/**'

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: customer-api-provider

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        id: build
        continue-on-error: true
        run: mvn -B package --file pom.xml

      - name: Publish JaCoCo coverage as PR comment
        if: github.event_name == 'pull_request' && hashFiles('customer-api-provider/target/site/jacoco/jacoco.xml') != ''
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: customer-api-provider/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 80
          title: Code Coverage Report
          update-comment: true

      - name: Propagate Maven build result
        if: steps.build.outcome == 'failure'
        run: exit 1
